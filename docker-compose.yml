services:
  db:
    image: postgres:17
    container_name: fastapi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_auth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
             DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_auth_db
             TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_test_db
    command: >
      sh -c "alembic upgrade head &&
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      -b 0.0.0.0:8000"

volumes:
  postgres_data:
